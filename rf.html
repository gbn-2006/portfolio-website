<!DOCTYPE html>
<html>
<head>
<title>Register Form</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#5bc0c7,#79d0c7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* main card */

.container{
width:800px;
display:flex;
background:white;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
overflow:hidden;
}

/* left information section */

.info{
width:40%;
background:#3f7faa;
color:white;
padding:40px;
}

.info h2{
margin-top:0;
}

.info p{
font-size:14px;
line-height:1.6;
}

.info button{
margin-top:20px;
padding:10px 20px;
border:none;
background:white;
color:#3f7faa;
font-weight:bold;
cursor:pointer;
border-radius:4px;
}

.info button:hover{
background:#f0f0f0;
}

/* right form section */

.form{
width:80%;
padding:40px;
}

.form h2{
color:#3f7faa;
margin-top:0;
}

.row{
display:flex;
gap:10px;
}

input{
width:80%;
padding:8px;
margin:8px 0;
border:1px solid #ccc;
border-radius:4px;
}

label{
font-size:13px;
font-weight:bold;
}

.checkbox{
font-size:13px;
margin:10px 0;
}

.register-btn{
background:#3f7faa;
color:white;
border:none;
padding:10px;
width:120px;
border-radius:4px;
cursor:pointer;
}

.register-btn:hover{
background:#2e6489;
}

a{
color:#3f7faa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<!-- Left Info Section -->

<div class="info">

<h2>INFORMATION</h2>

<p>
Lorem ipsum dolor sit amet, consectetur adipiscing elit,
sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
</p>

<p>
Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.
</p>

<button>Have An Account</button>

</div>


<!-- Register Form Section -->

<div class="form">

<h2>REGISTER FORM</h2>

<form>

<div class="row">

<div>
<label>First Name</label>
<input type="text" required>
</div>

<div>
<label>Last Name</label>
<input type="text" required>
</div>

</div>

<label>Your Email</label>
<input width="100%" type="email" required>

<div class="row">

<div>
<label>Password</label>
<input type="password" required>
</div>

<div>
<label>Confirm Password</label>
<input type="password" required>
</div>

</div>

<div class="checkbox">
<input type="checkbox" required>
I agree to the <a href="#">Terms and Conditions</a>
</div>

<button class="register-btn">Register</button>

</form>

</div>

</div>

</body>
</html>
